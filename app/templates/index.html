<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --surface2: #181b22;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.14);
            --text: #e8eaf0;
            --muted: #6b7280;
            --accent: #00e5a0;
            --accent-dim: rgba(0, 229, 160, 0.12);
            --accent-glow: rgba(0, 229, 160, 0.3);

            --aqi-good: #00e676;
            --aqi-moderate: #ffea00;
            --aqi-sensitive: #ff9100;
            --aqi-unhealthy: #ff3d00;
            --aqi-very: #b71c1c;
            --aqi-hazardous: #880e4f;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Atmosphere ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,229,160,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(59,130,246,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Noise grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 200px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ── Header ── */
        header {
            margin-bottom: 48px;
            animation: fadeDown 0.6s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid rgba(0,229,160,0.2);
            border-radius: 4px;
            padding: 5px 10px;
            margin-bottom: 16px;
        }

        .badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease infinite;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 8vw, 84px);
            letter-spacing: 0.03em;
            line-height: 0.9;
            color: var(--text);
            margin-bottom: 12px;
        }

        h1 span {
            color: var(--accent);
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            animation: fadeUp 0.6s ease both;
        }

        .card + .card { margin-top: 20px; }

        .card-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Grid inputs ── */
        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            transition: color 0.2s;
        }

        .field:focus-within label { color: var(--accent); }

        .field input, .field select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            padding: 10px 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        .field input:focus, .field select:focus {
            border-color: rgba(0,229,160,0.4);
            box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
            background: rgba(0,229,160,0.04);
        }

        .field input::placeholder { color: var(--muted); opacity: 0.5; }

        /* Remove number arrows */
        .field input::-webkit-outer-spin-button,
        .field input::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* Select arrow */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            font-size: 12px;
        }
        .field select { padding-right: 28px; cursor: pointer; }
        .field select option { background: var(--surface2); }

        /* ── City special field ── */
        .field.city-field input {
            border-color: rgba(0,229,160,0.2);
        }

        /* ── Submit button ── */
        .btn-row {
            margin-top: 28px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        button[type="submit"] {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--bg);
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 14px 32px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
            box-shadow: 0 0 24px rgba(0,229,160,0.25);
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0,229,160,0.4);
        }

        button[type="submit"]:hover::after { transform: translateX(100%); }
        button[type="submit"]:active { transform: translateY(0); }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .hint {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        /* ── Result panel ── */
        #result-panel {
            display: none;
            animation: fadeUp 0.5s ease both;
        }

        .result-inner {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 560px) {
            .result-inner { grid-template-columns: 1fr; }
        }

        .result-stat {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .result-stat .stat-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .result-stat .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            line-height: 1;
            color: var(--text);
        }

        .result-stat .stat-value.aqi-number {
            font-size: 60px;
            transition: color 0.4s;
        }

        .result-stat .stat-sub {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── AQI bar ── */
        .aqi-bar-wrap {
            margin-top: 24px;
        }

        .aqi-bar-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .aqi-bar {
            height: 8px;
            border-radius: 99px;
            background: linear-gradient(to right,
                var(--aqi-good) 0%,
                var(--aqi-moderate) 20%,
                var(--aqi-sensitive) 40%,
                var(--aqi-unhealthy) 60%,
                var(--aqi-very) 80%,
                var(--aqi-hazardous) 100%
            );
            position: relative;
        }

        .aqi-bar-pointer {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--text);
            border: 3px solid var(--bg);
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .aqi-bar-ticks {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .aqi-bar-ticks span {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }

        /* ── Category pill ── */
        .category-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 6px;
            transition: background 0.4s, color 0.4s;
        }

        /* ── Spinner ── */
        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ── Error ── */
        .error-msg {
            display: none;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: #ff6b6b;
            background: rgba(255,107,107,0.08);
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 12px;
        }

        /* ── Animations ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .card { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- Header -->
    <header>
        <div class="badge">Environmental Intelligence</div>
        <h1>AQI<br><span>Predictor</span></h1>
        <p class="subtitle">Enter pollutant concentrations to forecast air quality index</p>
    </header>

    <!-- Input Form -->
    <div class="card" style="animation-delay:0.15s">
        <div class="card-label">Pollutant Parameters</div>

        <form id="aqiForm">
            <div class="inputs-grid">

                <div class="field city-field">
                    <label>City Code</label>
                    <input type="number" id="city" placeholder="e.g. 4" required step="1">
                </div>

                <div class="field">
                    <label>PM2.5 <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="pm25" placeholder="e.g. 45.2" required step="any">
                </div>

                <div class="field">
                    <label>PM10 <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="pm10" placeholder="e.g. 80.1" required step="any">
                </div>

                <div class="field">
                    <label>NO <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="no" placeholder="e.g. 12.3" required step="any">
                </div>

                <div class="field">
                    <label>NO₂ <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="no2" placeholder="e.g. 25.7" required step="any">
                </div>

                <div class="field">
                    <label>NOx <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="nox" placeholder="e.g. 38.0" required step="any">
                </div>

                <div class="field">
                    <label>NH₃ <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="nh3" placeholder="e.g. 9.4" required step="any">
                </div>

                <div class="field">
                    <label>CO <span style="font-size:9px;color:var(--muted)">mg/m³</span></label>
                    <input type="number" id="co" placeholder="e.g. 1.2" required step="any">
                </div>

                <div class="field">
                    <label>SO₂ <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="so2" placeholder="e.g. 14.8" required step="any">
                </div>

                <div class="field">
                    <label>O₃ <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="o3" placeholder="e.g. 60.5" required step="any">
                </div>

                <div class="field">
                    <label>Benzene <span style="font-size:9px;color:var(--muted)">μg/m³</span></label>
                    <input type="number" id="benzene" placeholder="e.g. 2.1" required step="any">
                </div>

                <div class="field">
                    <label>Model</label>
                    <div class="select-wrapper">
                        <select id="model">
                            <option value="rf">Random Forest</option>
                            <option value="xgb">XGBoost</option>
                            <option value="lr">Linear Regression</option>
                        </select>
                    </div>
                </div>

            </div>

            <div class="btn-row">
                <button type="submit" id="submitBtn">Predict AQI</button>
                <div class="spinner" id="spinner"></div>
                <span class="hint" id="hint-text">Fill all fields to generate a prediction</span>
            </div>

            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <!-- Result Panel -->
    <div class="card" id="result-panel">
        <div class="card-label">Prediction Result</div>

        <div class="result-inner">
            <div class="result-stat">
                <div class="stat-label">AQI Value</div>
                <div class="stat-value aqi-number" id="res-aqi">—</div>
                <div class="stat-sub">Air Quality Index</div>
            </div>
            <div class="result-stat">
                <div class="stat-label">Category</div>
                <div class="stat-value" style="font-size:22px;margin-top:4px" id="res-category">—</div>
                <div><span class="category-pill" id="res-pill"></span></div>
            </div>
            <div class="result-stat">
                <div class="stat-label">Model Used</div>
                <div class="stat-value" style="font-size:22px;margin-top:4px" id="res-model">—</div>
                <div class="stat-sub" id="res-model-sub">—</div>
            </div>
        </div>

        <div class="aqi-bar-wrap">
            <div class="aqi-bar-label">AQI Scale (0 – 500)</div>
            <div class="aqi-bar">
                <div class="aqi-bar-pointer" id="bar-pointer" style="left:0%"></div>
            </div>
            <div class="aqi-bar-ticks">
                <span>0</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500+</span>
            </div>
        </div>
    </div>

</div>

<script>
    const MODEL_LABELS = {
        rf: 'Random Forest',
        xgb: 'XGBoost',
        lr: 'Linear Regression'
    };

    function getAQIColor(aqi) {
        if (aqi <= 50)  return { color: '#00e676', label: 'Good',            bg: 'rgba(0,230,118,0.15)',   text: '#00e676' };
        if (aqi <= 100) return { color: '#ffea00', label: 'Moderate',        bg: 'rgba(255,234,0,0.15)',   text: '#ffea00' };
        if (aqi <= 150) return { color: '#ff9100', label: 'Sensitive Groups', bg: 'rgba(255,145,0,0.15)',  text: '#ff9100' };
        if (aqi <= 200) return { color: '#ff3d00', label: 'Unhealthy',       bg: 'rgba(255,61,0,0.15)',    text: '#ff3d00' };
        if (aqi <= 300) return { color: '#b71c1c', label: 'Very Unhealthy',  bg: 'rgba(183,28,28,0.2)',    text: '#ef5350' };
        return                 { color: '#880e4f', label: 'Hazardous',        bg: 'rgba(136,14,79,0.2)',    text: '#e91e63' };
    }

    document.getElementById('aqiForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn     = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const hint    = document.getElementById('hint-text');
        const errBox  = document.getElementById('errorMsg');

        btn.disabled = true;
        spinner.style.display = 'block';
        hint.textContent = 'Running model…';
        errBox.style.display = 'none';

        const data = {
            city:    Number(document.getElementById('city').value),
            pm25:    Number(document.getElementById('pm25').value),
            pm10:    Number(document.getElementById('pm10').value),
            no:      Number(document.getElementById('no').value),
            no2:     Number(document.getElementById('no2').value),
            nox:     Number(document.getElementById('nox').value),
            nh3:     Number(document.getElementById('nh3').value),
            co:      Number(document.getElementById('co').value),
            so2:     Number(document.getElementById('so2').value),
            o3:      Number(document.getElementById('o3').value),
            benzene: Number(document.getElementById('benzene').value),
            model:   document.getElementById('model').value
        };

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error(`Server error: ${response.status}`);
            const result = await response.json();

            const aqi      = result.AQI;
            const category = result.category || result.category;
            const model    = result.model_used || data.model;

            const info = getAQIColor(aqi);

            // Populate stats
            const aqiEl = document.getElementById('res-aqi');
            aqiEl.textContent  = Math.round(aqi);
            aqiEl.style.color  = info.color;
            aqiEl.style.textShadow = `0 0 30px ${info.color}66`;

            document.getElementById('res-category').textContent = category;

            const pill = document.getElementById('res-pill');
            pill.textContent         = info.label;
            pill.style.background    = info.bg;
            pill.style.color         = info.text;
            pill.style.border        = `1px solid ${info.color}44`;

            document.getElementById('res-model').textContent     = MODEL_LABELS[model] || model;
            document.getElementById('res-model-sub').textContent = model.toUpperCase();

            // Move pointer
            const pct = Math.min(Math.max((aqi / 500) * 100, 1), 99);
            document.getElementById('bar-pointer').style.left = pct + '%';

            // Show panel
            const panel = document.getElementById('result-panel');
            panel.style.display = 'block';
            panel.style.animation = 'none';
            void panel.offsetWidth;
            panel.style.animation = 'fadeUp 0.5s ease both';
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            hint.textContent = 'Prediction complete ✓';

        } catch (err) {
            errBox.textContent     = '⚠ ' + err.message;
            errBox.style.display   = 'block';
            hint.textContent       = 'Something went wrong.';
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    });
</script>

</body>
</html>
